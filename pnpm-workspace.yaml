packages:
  - "sdks/*"
  - "packages/*"
  - "apps/*"
  - "examples"
  - "docs"

# Shared dependency versions. Packages reference these with `"typescript": "catalog:"`.
# https://pnpm.io/catalogs
catalog:
  typescript: ^6.0.3
  "@types/node": ^24.0.0
  vitest: ^4.1.7
  tsup: ^8.3.5

# pnpm 10 denies postinstall scripts by default.
# Entries below are trusted, build-time native modules.
onlyBuiltDependencies:
  - esbuild
  - sharp

# Allow Astro's deeper deps (tsconfck, zod-to-ts) to accept TypeScript 6 even
# though their published peer range maxes out at ^5 — the only reason they pin
# to 5 is `parsers` API compat, which the SDK doesn't exercise.
packageExtensions:
  tsconfck:
    peerDependencies:
      typescript: ">=5"
  zod-to-ts:
    peerDependencies:
      typescript: ">=4.9.4"
