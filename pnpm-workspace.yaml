packages:
  - "sdks/*"
  - "packages/*"
  - "apps/*"

# Shared dependency versions. Packages reference these with `"typescript": "catalog:"`.
# https://pnpm.io/catalogs
catalog:
  typescript: ^6.0.3
  "@types/node": ^24.0.0
  vitest: ^4.1.7
  tsup: ^8.3.5

# pnpm 10 denies postinstall scripts by default.
# Entries below are trusted, build-time native modules.
onlyBuiltDependencies:
  - esbuild
