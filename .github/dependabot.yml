version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    ignore:
      # @types/node should track our Node runtime LTS, not the npm latest.
      # Bumped manually alongside .nvmrc + engines.node.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      # TypeScript major upgrades touch every package's tsconfig and surface
      # breaking diagnostics — bump manually after auditing.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    groups:
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      prod-dependencies:
        dependency-type: production
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    groups:
      github-actions:
        patterns:
          - "*"
